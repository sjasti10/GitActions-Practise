name: Rename Files with Date



on:

  push:

    branches:

      - master



permissions:

  contents: write



jobs:

  rename-files:

    runs-on: ubuntu-latest



    steps:

      - uses: actions/checkout@v4

        with:

          token: ${{ secrets.GITHUB_TOKEN }}



      - name: Rename files

        run: |

          DATE=$(date +%Y%m%d)



          find . -type f ! -path "./.git/*" ! -path "./.github/*" | while read file

          do

            dir=$(dirname "$file")

            filename=$(basename "$file")



            if [[ "$filename" == *"_"[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]* ]]; then

              continue

            fi



            name="${filename%.*}"

            ext="${filename##*.}"



            if [ "$name" != "$filename" ]; then

              mv "$file" "$dir/${name}_${DATE}.${ext}"

            else

              mv "$file" "$dir/${filename}_${DATE}"

            fi

          done



      - name: Commit and push changes

        run: |

          git config user.name "github-actions[bot]"

          git config user.email "github-actions[bot]@users.noreply.github.com"



          git add .

          git commit -m "Rename files with date" || exit 0

          git push origin master
