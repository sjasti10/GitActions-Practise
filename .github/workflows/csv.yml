name: Convert Feed to CSV

on:
  push:
    branches:
      - master
    paths:
      - 'master-feed/**'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Convert files to CSV
        run: |
          for file in master-feed/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              sed 's/|/,/g' "$file" > "master-feed/${filename%.*}.csv"
            fi
          done

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push CSV
        run: |
          git add master-feed/*.csv

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Generate CSV files"
            git push
          fi
